<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprint Resource Planning 2026</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script>
        // Initialize Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyAxqJDTt5LPqfWTyxnTv_A5fe-34ULhMpw",
          authDomain: "developmentplanning-d0761.firebaseapp.com",
          projectId: "developmentplanning-d0761",
          storageBucket: "developmentplanning-d0761.firebasestorage.app",
          messagingSenderId: "811254392085",
          appId: "1:811254392085:web:5c5cec61391ec0fcae751c",
          measurementId: "G-GJL4BPD36T"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const { useState, useEffect } = React;
        
        const Plus = ({ size = 24 }) => {
            return React.createElement('svg', {
                width: size,
                height: size,
                viewBox: '0 0 24 24',
                fill: 'none',
                stroke: 'currentColor',
                strokeWidth: '2'
            }, 
                React.createElement('line', { x1: '12', y1: '5', x2: '12', y2: '19' }),
                React.createElement('line', { x1: '5', y1: '12', x2: '19', y2: '12' })
            );
        };
        
        const Trash2 = ({ size = 24 }) => {
            return React.createElement('svg', {
                width: size,
                height: size,
                viewBox: '0 0 24 24',
                fill: 'none',
                stroke: 'currentColor',
                strokeWidth: '2'
            },
                React.createElement('polyline', { points: '3 6 5 6 21 6' }),
                React.createElement('path', { d: 'M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2' }),
                React.createElement('line', { x1: '10', y1: '11', x2: '10', y2: '17' }),
                React.createElement('line', { x1: '14', y1: '11', x2: '14', y2: '17' })
            );
        };
        
        const Download = ({ size = 24 }) => {
            return React.createElement('svg', {
                width: size,
                height: size,
                viewBox: '0 0 24 24',
                fill: 'none',
                stroke: 'currentColor',
                strokeWidth: '2'
            },
                React.createElement('path', { d: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4' }),
                React.createElement('polyline', { points: '7 10 12 15 17 10' }),
                React.createElement('line', { x1: '12', y1: '15', x2: '12', y2: '3' })
            );
        };

        const Cloud = ({ size = 24 }) => {
            return React.createElement('svg', {
                width: size,
                height: size,
                viewBox: '0 0 24 24',
                fill: 'none',
                stroke: 'currentColor',
                strokeWidth: '2'
            },
                React.createElement('path', { d: 'M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z' })
            );
        };

        const ResourcePlanning = () => {
          const [loading, setLoading] = useState(true);
          const [saving, setSaving] = useState(false);
          const [lastSaved, setLastSaved] = useState(null);
          const [syncStatus, setSyncStatus] = useState('disconnected');
          
          const generateSprints = () => {
            const sprints = [];
            const sprintData = [
              { name: 'PTS26.02', start: '29.12.2025', end: '11.01.2026' },
              { name: 'PTS26.04', start: '12.01.2026', end: '25.01.2026' },
              { name: 'PTS26.06', start: '26.01.2026', end: '08.02.2026' },
              { name: 'PTS26.08', start: '09.02.2026', end: '22.02.2026' },
              { name: 'PTS26.10', start: '23.02.2026', end: '08.03.2026' },
              { name: 'PTS26.12', start: '09.03.2026', end: '22.03.2026' },
              { name: 'PTS26.14', start: '23.03.2026', end: '05.04.2026' },
              { name: 'PTS26.16', start: '06.04.2026', end: '19.04.2026' },
              { name: 'PTS26.18', start: '20.04.2026', end: '03.05.2026' },
              { name: 'PTS26.20', start: '04.05.2026', end: '17.05.2026' },
              { name: 'PTS26.22', start: '18.05.2026', end: '31.05.2026' },
              { name: 'PTS26.24', start: '01.06.2026', end: '14.06.2026' },
              { name: 'PTS26.26', start: '15.06.2026', end: '28.06.2026' },
              { name: 'PTS26.28', start: '29.06.2026', end: '12.07.2026' },
              { name: 'PTS26.30', start: '13.07.2026', end: '26.07.2026' },
              { name: 'PTS26.32', start: '27.07.2026', end: '09.08.2026' },
              { name: 'PTS26.34', start: '10.08.2026', end: '23.08.2026' },
              { name: 'PTS26.36', start: '24.08.2026', end: '06.09.2026' },
              { name: 'PTS26.38', start: '07.09.2026', end: '20.09.2026' },
              { name: 'PTS26.40', start: '21.09.2026', end: '04.10.2026' },
              { name: 'PTS26.42', start: '05.10.2026', end: '18.10.2026' },
              { name: 'PTS26.44', start: '19.10.2026', end: '01.11.2026' },
              { name: 'PTS26.46', start: '02.11.2026', end: '15.11.2026' },
              { name: 'PTS26.48', start: '16.11.2026', end: '29.11.2026' },
              { name: 'PTS26.50', start: '30.11.2026', end: '13.12.2026' },
              { name: 'PTS26.52', start: '14.12.2026', end: '27.12.2026' }
            ];
            
            sprintData.forEach(sprint => {
              sprints.push({
                name: sprint.name,
                startDate: sprint.start,
                endDate: sprint.end,
                period: `${sprint.start} - ${sprint.end}`,
                capacity: 130
              });
            });
            
            return sprints;
          };

          const [sprints, setSprints] = useState(generateSprints());
          const [developmentItems, setDevelopmentItems] = useState([{ name: '', allocations: {}, color: '#3b82f6' }]);
          const chartRef = React.useRef(null);
          const chartInstance = React.useRef(null);
          const saveTimeoutRef = React.useRef(null);

          // Load data from Firebase on mount
          useEffect(() => {
            const loadData = async () => {
              setLoading(true);
              setSyncStatus('loading');
              
              try {
                const doc = await db.collection('resourcePlanning').doc('mainData').get();
                
                if (doc.exists) {
                  const data = doc.data();
                  if (data.sprints) setSprints(data.sprints);
                  if (data.developmentItems) setDevelopmentItems(data.developmentItems);
                  if (data.lastSaved) setLastSaved(new Date(data.lastSaved));
                  setSyncStatus('synced');
                } else {
                  setSyncStatus('synced');
                }
              } catch (error) {
                console.error('Error loading data:', error);
                setSyncStatus('error');
              }
              
              setLoading(false);
            };
            
            loadData();
          }, []);

          // Auto-save to Firebase whenever data changes
          useEffect(() => {
            if (loading) return;
            
            if (saveTimeoutRef.current) {
              clearTimeout(saveTimeoutRef.current);
            }
            
            setSyncStatus('saving');
            
            saveTimeoutRef.current = setTimeout(async () => {
              setSaving(true);
              
              try {
                const data = {
                  sprints,
                  developmentItems,
                  lastSaved: new Date().toISOString()
                };
                
                await db.collection('resourcePlanning').doc('mainData').set(data);
                
                setLastSaved(new Date());
                setSyncStatus('synced');
              } catch (error) {
                console.error('Error saving data:', error);
                setSyncStatus('error');
              }
              
              setSaving(false);
            }, 1000);
            
            return () => {
              if (saveTimeoutRef.current) {
                clearTimeout(saveTimeoutRef.current);
              }
            };
          }, [sprints, developmentItems, loading]);

          const itemColors = [
            '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6',
            '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'
          ];

          const updateSprintCapacity = (sprintIndex, value) => {
            const updated = [...sprints];
            updated[sprintIndex].capacity = parseFloat(value) || 0;
            setSprints(updated);
          };

          const addDevelopmentItem = () => {
            const usedColors = developmentItems.map(item => item.color);
            const availableColor = itemColors.find(color => !usedColors.includes(color)) || itemColors[developmentItems.length % itemColors.length];
            setDevelopmentItems([...developmentItems, { name: '', allocations: {}, color: availableColor }]);
          };

          const removeDevelopmentItem = (index) => {
            setDevelopmentItems(developmentItems.filter((_, i) => i !== index));
          };

          const updateDevelopmentItemName = (index, name) => {
            const updated = [...developmentItems];
            updated[index].name = name;
            setDevelopmentItems(updated);
          };

          const updateDevelopmentItemColor = (index, color) => {
            const updated = [...developmentItems];
            updated[index].color = color;
            setDevelopmentItems(updated);
          };

          const updateAllocation = (itemIndex, sprintName, value) => {
            const updated = [...developmentItems];
            const numValue = parseFloat(value) || 0;
            if (numValue === 0) {
              delete updated[itemIndex].allocations[sprintName];
            } else {
              updated[itemIndex].allocations[sprintName] = numValue;
            }
            setDevelopmentItems(updated);
          };

          const getSprintTotals = () => {
            const totals = {};
            sprints.forEach(sprint => {
              let total = 0;
              developmentItems.forEach(item => {
                total += item.allocations[sprint.name] || 0;
              });
              totals[sprint.name] = total;
            });
            return totals;
          };

          const getDevelopmentItemTotals = () => {
            return developmentItems.map(item => {
              let total = 0;
              Object.values(item.allocations).forEach(value => {
                total += value;
              });
              return total;
            });
          };

          const exportToCSV = () => {
            let csv = 'Development Item,Sprint,Period,Days Allocated\n';
            developmentItems.forEach(item => {
              if (item.name) {
                sprints.forEach(sprint => {
                  const allocation = item.allocations[sprint.name] || 0;
                  if (allocation > 0) {
                    csv += `"${item.name}",${sprint.name},"${sprint.period}",${allocation}\n`;
                  }
                });
              }
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'resource_planning.csv';
            a.click();
          };

          const clearAllData = async () => {
            if (window.confirm('Are you sure you want to clear all data? This cannot be undone and will affect all users.')) {
              const defaultSprints = generateSprints();
              const defaultItems = [{ name: '', allocations: {}, color: '#3b82f6' }];
              
              setSprints(defaultSprints);
              setDevelopmentItems(defaultItems);
              
              try {
                await db.collection('resourcePlanning').doc('mainData').set({
                  sprints: defaultSprints,
                  developmentItems: defaultItems,
                  lastSaved: new Date().toISOString()
                });
                setSyncStatus('synced');
              } catch (error) {
                console.error('Error clearing data:', error);
                setSyncStatus('error');
              }
            }
          };

          const sprintTotals = getSprintTotals();
          const itemTotals = getDevelopmentItemTotals();

          // Update chart
          useEffect(() => {
            if (!chartRef.current) return;

            const datasets = [];
            
            datasets.push({
              label: 'Capacity',
              data: sprints.map(s => s.capacity),
              backgroundColor: '#e5e7eb',
              stack: 'bg'
            });

            developmentItems.forEach((item, idx) => {
              if (item.name) {
                datasets.push({
                  label: item.name,
                  data: sprints.map(sprint => item.allocations[sprint.name] || 0),
                  backgroundColor: item.color || itemColors[idx % itemColors.length],
                  stack: 'items'
                });
              }
            });

            if (chartInstance.current) {
              chartInstance.current.destroy();
            }

            chartInstance.current = new Chart(chartRef.current, {
              type: 'bar',
              data: {
                labels: sprints.map(s => s.name),
                datasets: datasets
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  x: { stacked: true },
                  y: {
                    stacked: true,
                    title: {
                      display: true,
                      text: 'Person-Days'
                    }
                  }
                },
                plugins: {
                  legend: {
                    display: true,
                    position: 'right',
                    onClick: function(e, legendItem, legend) {
                      const index = legendItem.datasetIndex;
                      const chart = legend.chart;
                      
                      // Check if this is the only visible dataset (excluding capacity)
                      let visibleCount = 0;
                      let lastVisible = -1;
                      chart.data.datasets.forEach((dataset, i) => {
                        if (i > 0 && chart.isDatasetVisible(i)) {
                          visibleCount++;
                          lastVisible = i;
                        }
                      });
                      
                      // If clicking the only visible item, show all
                      if (visibleCount === 1 && lastVisible === index) {
                        chart.data.datasets.forEach((dataset, i) => {
                          if (i > 0) {
                            chart.show(i);
                          }
                        });
                      } else {
                        // Hide all except capacity and clicked item
                        chart.data.datasets.forEach((dataset, i) => {
                          if (i === 0) {
                            chart.show(i); // Always show capacity
                          } else if (i === index) {
                            chart.show(i); // Show clicked item
                          } else {
                            chart.hide(i); // Hide others
                          }
                        });
                      }
                    }
                  }
                }
              }
            });

            return () => {
              if (chartInstance.current) {
                chartInstance.current.destroy();
              }
            };
          }, [sprints, developmentItems]);

          const getSyncStatusColor = () => {
            switch(syncStatus) {
              case 'synced': return 'text-green-600';
              case 'saving': return 'text-blue-600';
              case 'loading': return 'text-blue-600';
              case 'error': return 'text-red-600';
              default: return 'text-gray-600';
            }
          };

          const getSyncStatusText = () => {
            switch(syncStatus) {
              case 'synced': return lastSaved ? `Synced - Last saved: ${lastSaved.toLocaleTimeString()}` : 'Synced';
              case 'saving': return 'Saving...';
              case 'loading': return 'Loading...';
              case 'error': return 'Sync error - changes saved locally';
              default: return 'Disconnected';
            }
          };

          if (loading) {
            return React.createElement('div', { 
              className: 'flex items-center justify-center min-h-screen bg-gray-50' 
            },
              React.createElement('div', { className: 'text-center' },
                React.createElement('div', { className: 'text-xl text-gray-600 mb-2' }, 'Loading from Firebase...'),
                React.createElement('div', { className: 'text-sm text-gray-500' }, 'Syncing your data across devices')
              )
            );
          }

          return React.createElement('div', { className: 'p-6 max-w-full mx-auto bg-gray-50 min-h-screen' },
            React.createElement('div', { className: 'bg-white rounded-lg shadow-lg p-6 mb-6' },
              React.createElement('div', { className: 'flex justify-between items-center mb-6' },
                React.createElement('div', null,
                  React.createElement('h1', { className: 'text-3xl font-bold text-gray-800' }, 'Sprint Resource Planning 2026'),
                  React.createElement('div', { className: `flex items-center gap-2 text-sm mt-1 ${getSyncStatusColor()}` },
                    React.createElement(Cloud, { size: 16 }),
                    React.createElement('span', null, getSyncStatusText())
                  )
                ),
                React.createElement('div', { className: 'flex gap-2' },
                  React.createElement('button', {
                    onClick: clearAllData,
                    className: 'flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition'
                  },
                    React.createElement(Trash2, { size: 20 }),
                    'Clear All Data'
                  ),
                  React.createElement('button', {
                    onClick: exportToCSV,
                    className: 'flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition'
                  },
                    React.createElement(Download, { size: 20 }),
                    'Export CSV'
                  )
                )
              ),
              React.createElement('div', { className: 'mb-6 p-4 bg-blue-50 rounded-lg' },
                React.createElement('p', { className: 'text-sm text-gray-700' },
                  React.createElement('strong', null, 'Default Sprint Capacity: '),
                  '13 Backend Developers x 10 days = 130 person-days per sprint'
                )
              ),
              React.createElement('div', { className: 'overflow-x-auto' },
                React.createElement('table', { className: 'w-full border-collapse' },
                  React.createElement('thead', null,
                    React.createElement('tr', { className: 'bg-gray-100' },
                      React.createElement('th', { className: 'border border-gray-300 px-4 py-2 text-left sticky left-0 bg-gray-100 z-10 min-w-[200px]' }, 'Development Item'),
                      ...sprints.map((sprint, index) =>
                        React.createElement('th', { key: index, className: 'border border-gray-300 px-2 py-2 text-center min-w-[80px]' },
                          React.createElement('div', { className: 'text-sm font-semibold' }, sprint.name),
                          React.createElement('div', { className: 'text-xs text-gray-600 font-normal' }, sprint.startDate),
                          React.createElement('div', { className: 'text-xs text-gray-600 font-normal' }, sprint.endDate)
                        )
                      ),
                      React.createElement('th', { className: 'border border-gray-300 px-4 py-2 text-center sticky right-0 bg-gray-100 z-10 min-w-[100px]' }, 'Total Days'),
                      React.createElement('th', { className: 'border border-gray-300 px-2 py-2 text-center sticky right-0 bg-gray-100 z-10 min-w-[60px]' }, 'Actions')
                    )
                  ),
                  React.createElement('tbody', null,
                    ...developmentItems.map((item, itemIndex) =>
                      React.createElement('tr', { key: itemIndex, className: 'hover:bg-gray-50' },
                        React.createElement('td', { className: 'border border-gray-300 px-4 py-2 sticky left-0 bg-white z-10' },
                          React.createElement('div', { className: 'flex items-center gap-2' },
                            React.createElement('input', {
                              type: 'color',
                              value: item.color || itemColors[itemIndex % itemColors.length],
                              onChange: (e) => updateDevelopmentItemColor(itemIndex, e.target.value),
                              className: 'w-8 h-8 rounded border border-gray-300 cursor-pointer',
                              title: 'Choose color'
                            }),
                            React.createElement('input', {
                              type: 'text',
                              value: item.name,
                              onChange: (e) => updateDevelopmentItemName(itemIndex, e.target.value),
                              className: 'flex-1 px-2 py-1 border border-gray-300 rounded text-sm',
                              placeholder: 'Enter development item name'
                            })
                          )
                        ),
                        ...sprints.map((sprint, sprintIndex) =>
                          React.createElement('td', { key: sprintIndex, className: 'border border-gray-300 px-2 py-2' },
                            React.createElement('input', {
                              type: 'number',
                              value: item.allocations[sprint.name] || '',
                              onChange: (e) => updateAllocation(itemIndex, sprint.name, e.target.value),
                              className: `w-full px-2 py-1 border border-gray-300 rounded text-sm text-center ${
                                item.allocations[sprint.name] && item.allocations[sprint.name] > 0 
                                  ? 'bg-blue-50 font-semibold border-blue-300' 
                                  : 'bg-white text-gray-400'
                              }`,
                              placeholder: '0',
                              min: '0',
                              step: '0.5'
                            })
                          )
                        ),
                        React.createElement('td', { className: 'border border-gray-300 px-4 py-2 text-center font-semibold sticky right-0 bg-white z-10' },
                          itemTotals[itemIndex].toFixed(1)
                        ),
                        React.createElement('td', { className: 'border border-gray-300 px-2 py-2 text-center sticky right-0 bg-white z-10' },
                          React.createElement('button', {
                            onClick: () => removeDevelopmentItem(itemIndex),
                            className: 'p-1 text-red-600 hover:bg-red-50 rounded',
                            title: 'Delete development item'
                          },
                            React.createElement(Trash2, { size: 16 })
                          )
                        )
                      )
                    ),
                    React.createElement('tr', { className: 'bg-gray-100 font-semibold' },
                      React.createElement('td', { className: 'border border-gray-300 px-4 py-2 sticky left-0 bg-gray-100 z-10' }, 'Total Allocated'),
                      ...sprints.map((sprint, index) => {
                        const total = sprintTotals[sprint.name];
                        const isOverCapacity = total > sprint.capacity;
                        return React.createElement('td', {
                          key: index,
                          className: `border border-gray-300 px-2 py-2 text-center ${isOverCapacity ? 'bg-red-100 text-red-700' : 'bg-green-50 text-green-700'}`
                        }, total.toFixed(1));
                      }),
                      React.createElement('td', { className: 'border border-gray-300 px-4 py-2 sticky right-0 bg-gray-100 z-10' }),
                      React.createElement('td', { className: 'border border-gray-300 px-2 py-2 sticky right-0 bg-gray-100 z-10' })
                    ),
                    React.createElement('tr', { className: 'bg-gray-50' },
                      React.createElement('td', { className: 'border border-gray-300 px-4 py-2 sticky left-0 bg-gray-50 z-10' }, 'Capacity'),
                      ...sprints.map((sprint, index) =>
                        React.createElement('td', { key: index, className: 'border border-gray-300 px-2 py-2 text-center' },
                          React.createElement('input', {
                            type: 'number',
                            value: sprint.capacity,
                            onChange: (e) => updateSprintCapacity(index, e.target.value),
                            className: 'w-full px-2 py-1 border border-gray-300 rounded text-sm text-center bg-white',
                            min: '0',
                            step: '1'
                          })
                        )
                      ),
                      React.createElement('td', { className: 'border border-gray-300 px-4 py-2 sticky right-0 bg-gray-50 z-10' }),
                      React.createElement('td', { className: 'border border-gray-300 px-2 py-2 sticky right-0 bg-gray-50 z-10' })
                    ),
                    React.createElement('tr', { className: 'bg-gray-50 font-semibold' },
                      React.createElement('td', { className: 'border border-gray-300 px-4 py-2 sticky left-0 bg-gray-50 z-10' }, 'Remaining'),
                      ...sprints.map((sprint, index) => {
                        const remaining = sprint.capacity - sprintTotals[sprint.name];
                        const isOverCapacity = remaining < 0;
                        return React.createElement('td', {
                          key: index,
                          className: `border border-gray-300 px-2 py-2 text-center ${isOverCapacity ? 'text-red-700' : 'text-green-700'}`
                        }, remaining.toFixed(1));
                      }),
                      React.createElement('td', { className: 'border border-gray-300 px-4 py-2 sticky right-0 bg-gray-50 z-10' }),
                      React.createElement('td', { className: 'border border-gray-300 px-2 py-2 sticky right-0 bg-gray-50 z-10' })
                    )
                  )
                )
              ),
              React.createElement('button', {
                onClick: addDevelopmentItem,
                className: 'mt-4 flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition'
              },
                React.createElement(Plus, { size: 20 }),
                'Add Development Item'
              )
            ),
            React.createElement('div', { className: 'bg-white rounded-lg shadow-lg p-6' },
              React.createElement('h2', { className: 'text-2xl font-bold text-gray-800 mb-6' }, 'Resource Overview'),
