          const teamOrder = ['Backend', 'Database', 'Terminal', 'Backoffice', 'Digital'];

          const generateSprints = () => {
            const sprintData = [

              { name: '26.24', start: '01.06.2026', end: '14.06.2026', month: 'Jun' },
              { name: '26.26', start: '15.06.2026', end: '28.06.2026', month: 'Jun' },

              { name: '26.32', start: '27.07.2026', end: '09.08.2026', month: 'Aug' },
              { name: '26.34', start: '10.08.2026', end: '23.08.2026', month: 'Aug' },
              { name: '26.36', start: '24.08.2026', end: '06.09.2026', month: 'Sep' },
              { name: '26.38', start: '07.09.2026', end: '20.09.2026', month: 'Sep' },
              { name: '26.40', start: '21.09.2026', end: '04.10.2026', month: 'Oct' },
              { name: '26.42', start: '05.10.2026', end: '18.10.2026', month: 'Oct' },
              { name: '26.44', start: '19.10.2026', end: '01.11.2026', month: 'Nov' },
              { name: '26.46', start: '02.11.2026', end: '15.11.2026', month: 'Nov' },
              { name: '26.48', start: '16.11.2026', end: '29.11.2026', month: 'Nov' },
              { name: '26.50', start: '30.11.2026', end: '13.12.2026', month: 'Dec' },
              { name: '26.52', start: '14.12.2026', end: '27.12.2026', month: 'Dec' }
            ];
            
            return sprintData.map(sprint => ({
              name: sprint.name,
              startDate: sprint.start,
              endDate: sprint.end,
              month: sprint.month,
              period: `${sprint.start} - ${sprint.end}`
            }));
          };

          const sampleBackendData = [
            { name: 'FR-9018 Boyles Debitcard', color: '#10b981', allocations: { '26.02': 18, '26.04': 35, '26.06': 35, '26.08': 40, '26.10': 40, '26.12': 40, '26.14': 40, '26.16': 40 }},
            { name: 'FR-9034 PP Ramp Ret. Cont', color: '#14b8a6', allocations: { '26.02': 18, '26.04': 25, '26.06': 25, '26.08': 20 }},
            { name: 'Caixa Tilldroid', color: '#84cc16', allocations: { '26.04': 5, '26.06': 8, '26.08': 10, '26.10': 3, '26.12': 3 }},
            { name: 'SBS neo migration', color: '#ec4899', allocations: { '26.04': 9, '26.06': 3, '26.08': 3 }},
            { name: 'Async Improvements', color: '#ef4444', allocations: { '26.04': 8, '26.06': 8, '26.08': 5, '26.10': 10, '26.12': 10, '26.14': 10, '26.16': 10 }},
            { name: 'SBS Performance Improvements', color: '#dc2626', allocations: { '26.06': 2, '26.08': 5, '26.10': 10 }},
            { name: 'FR-5857 Improved ticket storage', color: '#3b82f6', allocations: { '26.02': 8, '26.04': 20, '26.06': 20, '26.08': 20, '26.10': 20, '26.12': 20, '26.14': 20, '26.16': 20, '26.18': 20, '26.20': 20, '26.22': 20, '26.24': 20, '26.26': 20 }},
            { name: 'Semantic Search', color: '#06b6d4', allocations: { '26.04': 15, '26.06': 20, '26.08': 15, '26.10': 10, '26.12': 20 }},
            { name: 'Digital: Tickethistory', color: '#0ea5e9', allocations: { '26.06': 5, '26.08': 5, '26.10': 5, '26.12': 5, '26.14': 5, '26.16': 5 }},
            { name: 'Betbuilder+', color: '#14b8a6', allocations: { '26.02': 1 }},
            { name: 'Backend BAU', color: '#eab308', allocations: { '26.02': 16, '26.04': 20, '26.06': 20, '26.08': 20, '26.10': 20, '26.12': 20, '26.14': 20, '26.16': 20, '26.18': 20, '26.20': 20, '26.22': 20, '26.24': 20, '26.26': 20, '26.28': 20, '26.30': 20, '26.32': 20, '26.34': 20, '26.36': 20 }},
            { name: 'SystemIntegration BAU', color: '#a3a308', allocations: { '26.10': 20, '26.12': 20, '26.14': 20, '26.16': 20, '26.18': 20, '26.20': 20, '26.22': 20, '26.24': 20, '26.26': 20, '26.28': 20, '26.30': 20, '26.32': 20, '26.34': 20, '26.36': 20, '26.38': 20, '26.40': 20, '26.42': 20, '26.44': 20, '26.46': 20, '26.48': 20, '26.50': 20, '26.52': 20 }}
          ];

          const initialTeams = {
            'Backend': {
              name: 'Backend',
              color: '#3b82f6',
              employees: [{ name: '13 Backend Developers', daysPerWeek: 65 }],
              defaultCapacity: 130,
              sprints: generateSprints().map(s => ({ ...s, capacity: 130 })),
              developmentItems: sampleBackendData
            },
            'Terminal': {
              name: 'Terminal',
              color: '#ef4444',
              employees: [{ name: 'Default Team', daysPerWeek: 40 }],
              defaultCapacity: 80,
              sprints: generateSprints().map(s => ({ ...s, capacity: 80 })),
              developmentItems: []
            },
            'Backoffice': {
              name: 'Backoffice',
              color: '#10b981',
              employees: [{ name: 'Default Team', daysPerWeek: 30 }],
              defaultCapacity: 60,
              sprints: generateSprints().map(s => ({ ...s, capacity: 60 })),
              developmentItems: []
            },
            'Digital': {
              name: 'Digital',
              color: '#f59e0b',
              employees: [{ name: 'Default Team', daysPerWeek: 50 }],
              defaultCapacity: 100,
              sprints: generateSprints().map(s => ({ ...s, capacity: 100 })),
              developmentItems: []
            },
            'Database': {
              name: 'Database',
              color: '#8b5cf6',
              employees: [{ name: 'Default Team', daysPerWeek: 20 }],
              defaultCapacity: 40,
              sprints: generateSprints().map(s => ({ ...s, capacity: 40 })),
              developmentItems: []
            }
          };

          const [teams, setTeams] = useState(initialTeams);

          const itemColors = [
            '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6',
            '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'
          ];

          useEffect(() => {
            const loadData = async () => {
              setLoading(true);
              setSyncStatus('loading');
              
              try {
                const doc = await db.collection('multiTeamResourcePlanning').doc('teams').get();
                
                if (doc.exists) {
                  const data = doc.data();
                  if (data.teams) {
                    const migratedTeams = {};
                    Object.keys(data.teams).forEach(teamName => {
                      const team = data.teams[teamName];
                      migratedTeams[teamName] = {
                        ...team,
                        employees: team.employees || [{ name: 'Default Team', daysPerWeek: team.sprints?.[0]?.capacity / 2 || 65 }],
                        sprints: team.sprints.map(s => ({
                          ...s,
                          name: s.name.replace('PTS', '')
                        })),
                        developmentItems: team.developmentItems.map(item => {
                          const newAllocations = {};
                          Object.keys(item.allocations || {}).forEach(sprintName => {
                            const newName = sprintName.replace('PTS', '');
                            newAllocations[newName] = item.allocations[sprintName];
                          });
                          return {
                            ...item,
                            allocations: newAllocations
                          };
                        })
                      };
                    });
                    setTeams(migratedTeams);
                  }
                  if (data.lastSaved) setLastSaved(new Date(data.lastSaved));
                  setSyncStatus('synced');
                } else {
                  setSyncStatus('synced');
                }
              } catch (error) {
                console.error('Error loading data:', error);
                setSyncStatus('error');
              }
              
              setLoading(false);
            };
            
            loadData();
          }, []);

          useEffect(() => {
            if (loading) return;
            
            if (saveTimeoutRef.current) {
              clearTimeout(saveTimeoutRef.current);
            }
            
            setSyncStatus('saving');
            
            saveTimeoutRef.current = setTimeout(async () => {
              try {
                const data = {
                  teams,
                  lastSaved: new Date().toISOString()
                };
                
                await db.collection('multiTeamResourcePlanning').doc('teams').set(data);
                
                setLastSaved(new Date());
                setSyncStatus('synced');
              } catch (error) {
                console.error('Error saving data:', error);
                setSyncStatus('error');
              }
            }, 1000);
            
            return () => {
              if (saveTimeoutRef.current) {
                clearTimeout(saveTimeoutRef.current);
              }
            };
          }, [teams, loading]);

          useEffect(() => {
            if (loading) return;
            
            // Clean up all previous charts
            Object.keys(chartInstancesRef.current).forEach(key => {
              if (chartInstancesRef.current[key]) {
                chartInstancesRef.current[key].destroy();
                delete chartInstancesRef.current[key];
              }
            });
            
            const timer = setTimeout(() => {
              if (activeTeam === 'All Teams') {
                renderAllTeamsChart();
              } else if (teams[activeTeam]) {
                renderTeamChart(activeTeam);
              }
            }, 150);
            
            return () => {
              clearTimeout(timer);
            };
          }, [activeTeam]);

          // Initial chart render after loading
          useEffect(() => {
            if (!loading && activeTeam) {
              const timer = setTimeout(() => {
                if (activeTeam === 'All Teams') {
                  renderAllTeamsChart();
                } else if (teams[activeTeam]) {
                  renderTeamChart(activeTeam);
                }
              }, 200);
              
              return () => clearTimeout(timer);
            }
          }, [loading]);

          const renderTeamChart = (teamName) => {
            const team = teams[teamName];
            if (!team) return;
            
            const canvas = document.getElementById('single-team-chart');
            if (!canvas) return;

            // Destroy existing chart
            if (chartInstancesRef.current['single-team-chart']) {
              chartInstancesRef.current['single-team-chart'].destroy();
              delete chartInstancesRef.current['single-team-chart'];
            }

            const ctx = canvas.getContext('2d');
            
            const datasets = team.developmentItems
              .filter(item => item.name)
              .map(item => ({
                label: item.name,
                data: team.sprints.map(sprint => item.allocations[sprint.name] || 0),
                backgroundColor: item.color,
                borderColor: item.color,
                borderWidth: 1,
                stack: 'allocations'
              }));

            datasets.push({
              label: 'Capacity',
              data: team.sprints.map(sprint => sprint.capacity),
              type: 'line',
              borderColor: '#94a3b8',
              backgroundColor: 'transparent',
              borderWidth: 2,
              borderDash: [5, 5],
              pointRadius: 3,
              fill: false
            });

            chartInstancesRef.current['single-team-chart'] = new Chart(ctx, {
              type: 'bar',
              data: {
                labels: team.sprints.map(s => s.name),
                datasets: datasets
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                  mode: 'index',
                  intersect: false
                },
                plugins: {
                  legend: {
                    position: 'right',
                    labels: {
                      boxWidth: 12,
                      padding: 8,
                      font: { size: 10 }
                    }
                  },
                  tooltip: {
                    callbacks: {
                      footer: (tooltipItems) => {
                        const sprintIndex = tooltipItems[0].dataIndex;
                        const allocated = datasets
                          .filter(d => d.stack === 'allocations')
                          .reduce((sum, d) => sum + d.data[sprintIndex], 0);
                        const capacity = team.sprints[sprintIndex].capacity;
                        const remaining = capacity - allocated;
                        return `\nTotal Allocated: ${allocated}\nCapacity: ${capacity}\nRemaining: ${remaining}`;
                      }
                    }
                  }
                },
                scales: {
                  x: {
                    stacked: true,
                    ticks: {
                      font: { size: 9 }
                    }
                  },
                  y: {
                    stacked: true,
                    beginAtZero: true,
                    title: {
                      display: true,
                      text: 'Days'
                    }
                  }
                },
                animation: false,
                layout: {
                  padding: {
                    right: 20
                  }
                }
              }
            });
          };

          const renderAllTeamsChart = () => {
            const canvas = document.getElementById('chart-all-teams');
            if (!canvas) return;

            // Destroy existing chart
            if (chartInstancesRef.current['chart-all-teams']) {
              chartInstancesRef.current['chart-all-teams'].destroy();
              delete chartInstancesRef.current['chart-all-teams'];
            }

            const ctx = canvas.getContext('2d');
            const allSprints = generateSprints();
            const datasets = [];

            // Für jedes Team: prozentuale Auslastung als Linie
            teamOrder.forEach(teamName => {
              if (!teams[teamName]) return;
              const team = teams[teamName];

              const utilizationData = allSprints.map(sprint => {
                const allocated = team.developmentItems.reduce((sum, item) => {
                  return sum + (item.allocations[sprint.name] || 0);
                }, 0);
                const sprintData = team.sprints.find(s => s.name === sprint.name);
                const capacity = sprintData ? sprintData.capacity : 0;
                return capacity > 0 ? (allocated / capacity) * 100 : 0;
              });

              datasets.push({
                label: teamName,
                data: utilizationData,
                borderColor: team.color,
                backgroundColor: team.color,
                borderWidth: 3,
                pointRadius: 4,
                pointHoverRadius: 6,
                fill: false,
                tension: 0.1
              });
            });

            // 100% Referenzlinie
            datasets.push({
              label: '100% Target',
              data: allSprints.map(() => 100),
              borderColor: '#dc2626',
              backgroundColor: 'transparent',
              borderWidth: 2,
              borderDash: [10, 5],
              pointRadius: 0,
              fill: false
            });

            chartInstancesRef.current['chart-all-teams'] = new Chart(ctx, {
              type: 'line',
              data: {
                labels: allSprints.map(s => s.name),
                datasets: datasets
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                  mode: 'index',
                  intersect: false
                },
                plugins: {
                  legend: {
                    position: 'right',
                    labels: {
                      boxWidth: 12,
                      padding: 8,
                      font: { size: 10 },
                      filter: (item) => item.text !== '100% Target'
                    }
                  },
                  tooltip: {
                    callbacks: {
                      title: (tooltipItems) => {
                        const sprint = allSprints[tooltipItems[0].dataIndex];
                        return `${sprint.name} (${sprint.period})`;
                      },
                      label: (context) => {
                        if (context.dataset.label === '100% Target') return null;
                        const teamName = context.dataset.label;
                        const team = teams[teamName];
                        const sprintIndex = context.dataIndex;
                        const sprint = allSprints[sprintIndex];
                        
                        const allocated = team.developmentItems.reduce((sum, item) => {
                          return sum + (item.allocations[sprint.name] || 0);
                        }, 0);
                        const sprintData = team.sprints.find(s => s.name === sprint.name);
                        const capacity = sprintData ? sprintData.capacity : 0;
                        const utilization = Math.round(context.parsed.y);
                        
                        const status = utilization > 100 ? '⚠️ OVERLOADED' : utilization > 80 ? '⚡ HIGH' : '✓ OK';
                        return `${teamName}: ${utilization}% (${allocated}/${capacity} days) ${status}`;
                      }
                    }
                  },
                  annotation: {
                    annotations: {
                      line100: {
                        type: 'line',
                        yMin: 100,
                        yMax: 100,
                        borderColor: '#dc2626',
                        borderWidth: 2,
                        borderDash: [10, 5]
                      }
                    }
                  }
                },
                scales: {
                  x: {
                    ticks: {
                      font: { size: 9 }
                    }
                  },
                  y: {
                    beginAtZero: true,
                    max: 120,
                    title: {
                      display: true,
                      text: 'Utilization (%)'
                    },
                    ticks: {
                      callback: (value) => value + '%'
                    },
                    grid: {
                      color: (context) => {
                        if (context.tick.value === 100) {
                          return '#dc2626';
                        }
                        return 'rgba(0, 0, 0, 0.1)';
                      },
                      lineWidth: (context) => {
                        if (context.tick.value === 100) {
                          return 2;
                        }
                        return 1;
                      }
                    }
                  }
                },
                animation: false,
                layout: {
                  padding: {
                    right: 20
                  }
                }
              }
            });
          };

          const addEmployee = (teamName) => {
            setTeams(prev => {
              const updated = { ...prev };
              updated[teamName] = {
                ...updated[teamName],
                employees: [...updated[teamName].employees, { name: '', daysPerWeek: 0 }]
              };
              return updated;
            });
          };

          const updateEmployee = (teamName, empIndex, field, value) => {
            setTeams(prev => {
              const updated = { ...prev };
              const employees = [...updated[teamName].employees];
              employees[empIndex] = { ...employees[empIndex], [field]: field === 'daysPerWeek' ? Number(value) || 0 : value };
              
              const totalCapacity = employees.reduce((sum, emp) => sum + (emp.daysPerWeek || 0), 0);
              
              updated[teamName] = {
                ...updated[teamName],
                employees,
                defaultCapacity: totalCapacity
              };
              return updated;
            });
          };

          const removeEmployee = (teamName, empIndex) => {
            setTeams(prev => {
              const updated = { ...prev };
              const employees = updated[teamName].employees.filter((_, i) => i !== empIndex);
              
              const totalCapacity = employees.reduce((sum, emp) => sum + (emp.daysPerWeek || 0), 0);
              
              updated[teamName] = {
                ...updated[teamName],
                employees: employees.length > 0 ? employees : [{ name: '', daysPerWeek: 0 }],
                defaultCapacity: totalCapacity
              };
              return updated;
            });
          };

          const updateSprintCapacity = (teamName, sprintName, value) => {
            setTeams(prev => {

                    const totalCapacity = team.sprints.reduce((sum, s) => sum + s.capacity, 0);
                    const avgUtilization = totalCapacity > 0 ? Math.round((totalAllocated / totalCapacity) * 100) : 0;
                    
                    const statusColor = avgUtilization > 100 ? '#dc2626' : avgUtilization > 80 ? '#f59e0b' : '#10b981';
                    const statusIcon = avgUtilization > 100 ? '⚠️' : avgUtilization > 80 ? '⚡' : '✓';
                    
                    return React.createElement('div', { 
                      key: teamName, 
                      className: 'p-3 bg-white rounded border-l-4 hover:shadow-md transition-shadow',
                      style: { borderLeftColor: team.color }
                    },
                      React.createElement('div', { className: 'flex items-center justify-between mb-2' },
                        React.createElement('div', { className: 'font-bold', style: { color: team.color } }, teamName),
                        React.createElement('span', { className: 'text-xl' }, statusIcon)
                      ),
                      React.createElement('div', { className: 'text-2xl font-bold mb-1', style: { color: statusColor } }, 
                        `${avgUtilization}%`
                      ),
                      React.createElement('div', { className: 'text-xs text-gray-600 mb-1' }, 
                        `${totalAllocated} / ${totalCapacity} days`
                      ),
                      React.createElement('div', { className: 'text-xs text-gray-600' }, 
                        `${team.developmentItems.filter(i => i.name).length} active items`
                      )
                    );
                  })
                ),
                React.createElement('div', { className: 'mt-3 pt-3 border-t text-xs text-gray-600' },
                  React.createElement('div', { className: 'flex gap-4' },
                    React.createElement('span', null, '✓ 0-80%: Healthy'),
                    React.createElement('span', null, '⚡ 81-100%: High Load'),
                    React.createElement('span', null, '⚠️ >100%: Overloaded')
                  )
                )
              ),

              React.createElement('div', { className: 'overflow-x-auto' },
                React.createElement('table', { className: 'w-full border-collapse text-sm' },
                  React.createElement('thead', null,
                    React.createElement('tr', { className: 'bg-gray-200' },
                      React.createElement('th', { className: 'border p-1 text-center sticky left-0 bg-gray-200 z-20 w-[120px]' }),
                      React.createElement('th', { className: 'border p-1 text-left sticky left-[120px] bg-gray-200 z-20 w-[300px]' }),
                      (() => {
                        let currentMonth = '';
                        let monthSpan = 0;
                        const monthHeaders = [];
                        
                        allSprints.forEach((sprint, idx) => {
                          if (sprint.month !== currentMonth) {
                            if (monthSpan > 0) {
                              monthHeaders.push({ month: currentMonth, span: monthSpan });
                            }
                            currentMonth = sprint.month;
                            monthSpan = 1;
                          } else {
                            monthSpan++;
                          }
                          
                          if (idx === allSprints.length - 1) {
                            monthHeaders.push({ month: currentMonth, span: monthSpan });
                          }
                        });
                        
                        return monthHeaders.map((header, idx) =>
                          React.createElement('th', { 
                            key: idx, 
                            colSpan: header.span, 
                            className: 'border p-1 text-center font-bold text-gray-700' 
                          }, header.month)
                        );
                      })(),
                      React.createElement('th', { className: 'border p-1 text-center sticky right-0 bg-gray-200 z-20 w-[90px]' })
                    ),
                    React.createElement('tr', { className: 'bg-gray-100' },
                      React.createElement('th', { className: 'border p-2 text-left sticky left-0 bg-gray-100 z-20 w-[120px]' }, 'Team'),
                      React.createElement('th', { className: 'border p-2 text-left sticky left-[120px] bg-gray-100 z-20 w-[300px]' }, 'Development Item'),
                      allSprints.map(sprint =>
                        React.createElement('th', { 
                          key: sprint.name, 
                          className: 'border p-2 text-center w-[70px]',
                          title: sprint.period
                        }, sprint.name)
                      ),
                      React.createElement('th', { className: 'border p-2 text-center sticky right-0 bg-gray-100 z-20 w-[90px]' }, 'Total Days')
                    )
                  ),
                  React.createElement('tbody', null,
                    teamOrder.map(teamName => {
                      if (!teams[teamName]) return null;
                      const t = teams[teamName];
                      const items = t.developmentItems.filter(item => item.name);
                      
                      if (items.length === 0) return null;
                      
                      return [
                        React.createElement('tr', { key: `${teamName}-header`, className: 'bg-gray-50' },
                          React.createElement('td', { 
                            colSpan: allSprints.length + 3,
                            className: 'border p-2 font-bold sticky left-0 z-10',
                            style: { backgroundColor: t.color + '20', color: t.color }
                          }, `${teamName} Team`)
                        ),
                        ...items.map((item, itemIdx) =>
                          React.createElement('tr', { key: `${teamName}-${itemIdx}`, className: 'hover:bg-gray-50' },
                            React.createElement('td', { 
                              className: 'border p-2 text-center sticky left-0 bg-white z-10',
                              style: { color: t.color }
                            },
                              React.createElement('div', { className: 'flex items-center justify-center gap-2' },
                                React.createElement('div', { 
                                  className: 'w-3 h-3 rounded-full',
                                  style: { backgroundColor: t.color }
                                }),
                                React.createElement('span', { className: 'font-medium text-xs' }, teamName)
                              )
                            ),
                            React.createElement('td', { className: 'border p-2 sticky left-[120px] bg-white z-10' },
                              React.createElement('div', { className: 'flex items-center gap-2' },
                                React.createElement('div', { 
                                  className: 'w-4 h-4 rounded',
                                  style: { backgroundColor: item.color }
                                }),
                                item.name
                              )
                            ),
                            allSprints.map(sprint => {
                              const value = item.allocations[sprint.name] || '';
                              const hasValue = value > 0;
                              return React.createElement('td', { 
                                key: sprint.name, 
                                className: `border p-2 text-center ${hasValue ? 'font-medium' : ''}`,
                                style: { 
                                  width: '70px',
                                  backgroundColor: hasValue ? t.color + '15' : 'transparent'
                                }
                              }, value);
                            }),
                            React.createElement('td', { className: 'border p-2 text-center font-bold sticky right-0 bg-white z-10' },
                              Object.values(item.allocations).reduce((sum, val) => sum + val, 0)
                            )
                          )
                        )
                      ];
                    }).flat()
                  )
                )
              )
            )
          );
        };

        ReactDOM.render(React.createElement(ResourcePlanning), document.getElementById('root'));
    </script>
</body>
</html>
