<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Development Ressourcenplanung 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.5.0/dist/Recharts.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell } = Recharts;

        // Firebase Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyAxqJDTt5LPqfWTyxnTv_A5fe-34ULhMpw",
            authDomain: "developmentplanning-d0761.firebaseapp.com",
            projectId: "developmentplanning-d0761",
            storageBucket: "developmentplanning-d0761.firebasestorage.app",
            messagingSenderId: "811254392085",
            appId: "1:811254392085:web:5c5cec61391ec0fcae751c",
            measurementId: "G-GJL4BPD36T"
        };

        // Firebase initialisieren
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Sprint-Daten für 2026
        const SPRINTS = Array.from({ length: 26 }, (_, i) => {
            const sprintNum = i + 1;
            const startWeek = i * 2 + 1;
            const endWeek = startWeek + 1;
            return {
                id: `2026-${String(sprintNum).padStart(2, '0')}`,
                name: `Sprint ${sprintNum}`,
                startWeek,
                endWeek
            };
        });

        function ResourcePlanner() {
            const [teams, setTeams] = useState([]);
            const [selectedTeam, setSelectedTeam] = useState(null);
            const [devItems, setDevItems] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [showNewTeamDialog, setShowNewTeamDialog] = useState(false);
            const [showNewItemDialog, setShowNewItemDialog] = useState(false);
            const [newTeamName, setNewTeamName] = useState('');
            const [newTeamCapacity, setNewTeamCapacity] = useState(10);

            const [newItem, setNewItem] = useState({
                title: '',
                sprint: '',
                complexity: 5
            });

            // Teams laden
            useEffect(() => {
                const unsubscribe = db.collection('teams').onSnapshot(snapshot => {
                    const teamsData = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setTeams(teamsData);
                    if (!selectedTeam && teamsData.length > 0) {
                        setSelectedTeam(teamsData[0].id);
                    }
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Dev Items laden
            useEffect(() => {
                if (!selectedTeam) return;
                
                const unsubscribe = db.collection('devItems')
                    .where('teamId', '==', selectedTeam)
                    .onSnapshot(snapshot => {
                        const itemsData = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setDevItems(itemsData);
                    });
                return () => unsubscribe();
            }, [selectedTeam]);

            const addTeam = async () => {
                if (!newTeamName.trim()) return;
                await db.collection('teams').add({
                    name: newTeamName,
                    capacity: newTeamCapacity
                });
                setNewTeamName('');
                setNewTeamCapacity(10);
                setShowNewTeamDialog(false);
            };

            const addDevItem = async () => {
                if (!newItem.title.trim() || !newItem.sprint) return;
                await db.collection('devItems').add({
                    teamId: selectedTeam,
                    title: newItem.title,
                    sprint: newItem.sprint,
                    complexity: newItem.complexity,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setNewItem({ title: '', sprint: '', complexity: 5 });
                setShowNewItemDialog(false);
            };

            const deleteItem = async (itemId) => {
                if (confirm('Item wirklich löschen?')) {
                    await db.collection('devItems').doc(itemId).delete();
                }
            };

            const deleteTeam = async (teamId) => {
                if (confirm('Team und alle zugehörigen Items wirklich löschen?')) {
                    // Items löschen
                    const itemsSnapshot = await db.collection('devItems')
                        .where('teamId', '==', teamId)
                        .get();
                    const batch = db.batch();
                    itemsSnapshot.docs.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    
                    // Team löschen
                    await db.collection('teams').doc(teamId).delete();
                    
                    if (selectedTeam === teamId) {
                        setSelectedTeam(teams[0]?.id || null);
                    }
                }
            };

            // Berechne Auslastung pro Sprint
            const getSprintData = () => {
                const currentTeam = teams.find(t => t.id === selectedTeam);
                if (!currentTeam) return [];

                return SPRINTS.map(sprint => {
                    const items = devItems.filter(item => item.sprint === sprint.id);
                    const totalComplexity = items.reduce((sum, item) => sum + item.complexity, 0);
                    const utilization = (totalComplexity / currentTeam.capacity) * 100;
                    
                    return {
                        sprint: sprint.name,
                        capacity: currentTeam.capacity,
                        used: totalComplexity,
                        utilization: Math.round(utilization)
                    };
                });
            };

            const sprintData = getSprintData();

            if (isLoading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="text-xl">Lade Daten...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 p-6">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold mb-6 text-gray-800">Development Ressourcenplanung 2026</h1>

                        {/* Team Auswahl */}
                        <div className="bg-white rounded-lg shadow p-6 mb-6">
                            <div className="flex items-center gap-4 mb-4">
                                <label className="font-semibold">Team:</label>
                                <select 
                                    value={selectedTeam || ''} 
                                    onChange={(e) => setSelectedTeam(e.target.value)}
                                    className="border rounded px-3 py-2 flex-1"
                                >
                                    {teams.map(team => (
                                        <option key={team.id} value={team.id}>
                                            {team.name} (Kapazität: {team.capacity} SP)
                                        </option>
                                    ))}
                                </select>
                                <button 
                                    onClick={() => setShowNewTeamDialog(true)}
                                    className="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600"
                                >
                                    + Neues Team
                                </button>
                                {selectedTeam && (
                                    <button 
                                        onClick={() => deleteTeam(selectedTeam)}
                                        className="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"
                                    >
                                        Team löschen
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Auslastungs-Chart */}
                        {selectedTeam && (
                            <div className="bg-white rounded-lg shadow p-6 mb-6">
                                <h2 className="text-xl font-bold mb-4">Sprint-Auslastung</h2>
                                <ResponsiveContainer width="100%" height={300}>
                                    <BarChart data={sprintData}>
                                        <CartesianGrid strokeDasharray="3 3" />
                                        <XAxis dataKey="sprint" angle={-45} textAnchor="end" height={100} />
                                        <YAxis />
                                        <Tooltip />
                                        <Legend />
                                        <Bar dataKey="capacity" fill="#94a3b8" name="Kapazität" />
                                        <Bar dataKey="used" name="Verwendet">
                                            {sprintData.map((entry, index) => (
                                                <Cell 
                                                    key={`cell-${index}`} 
                                                    fill={entry.utilization > 100 ? '#ef4444' : entry.utilization > 80 ? '#f59e0b' : '#10b981'} 
                                                />
                                            ))}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        )}

                        {/* Dev Items */}
                        {selectedTeam && (
                            <div className="bg-white rounded-lg shadow p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold">Development Items</h2>
                                    <button 
                                        onClick={() => setShowNewItemDialog(true)}
                                        className="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
                                    >
                                        + Neues Item
                                    </button>
                                </div>

                                <div className="space-y-2">
                                    {devItems.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">Keine Items vorhanden</p>
                                    ) : (
                                        devItems.map(item => (
                                            <div key={item.id} className="border rounded p-4 flex justify-between items-center hover:bg-gray-50">
                                                <div>
                                                    <div className="font-semibold">{item.title}</div>
                                                    <div className="text-sm text-gray-600">
                                                        Sprint: {SPRINTS.find(s => s.id === item.sprint)?.name} | 
                                                        Komplexität: {item.complexity} SP
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => deleteItem(item.id)}
                                                    className="text-red-500 hover:text-red-700"
                                                >
                                                    Löschen
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Dialog: Neues Team */}
                        {showNewTeamDialog && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-lg p-6 max-w-md w-full">
                                    <h3 className="text-xl font-bold mb-4">Neues Team erstellen</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block mb-2">Team Name:</label>
                                            <input 
                                                type="text"
                                                value={newTeamName}
                                                onChange={(e) => setNewTeamName(e.target.value)}
                                                className="border rounded px-3 py-2 w-full"
                                                placeholder="z.B. Team Alpha"
                                            />
                                        </div>
                                        <div>
                                            <label className="block mb-2">Kapazität (Story Points pro Sprint):</label>
                                            <input 
                                                type="number"
                                                value={newTeamCapacity}
                                                onChange={(e) => setNewTeamCapacity(parseInt(e.target.value))}
                                                className="border rounded px-3 py-2 w-full"
                                                min="1"
                                            />
                                        </div>
                                        <div className="flex gap-2 justify-end">
                                            <button 
                                                onClick={() => setShowNewTeamDialog(false)}
                                                className="px-4 py-2 border rounded hover:bg-gray-100"
                                            >
                                                Abbrechen
                                            </button>
                                            <button 
                                                onClick={addTeam}
                                                className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                                            >
                                                Erstellen
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Dialog: Neues Item */}
                        {showNewItemDialog && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-lg p-6 max-w-md w-full">
                                    <h3 className="text-xl font-bold mb-4">Neues Development Item</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block mb-2">Titel:</label>
                                            <input 
                                                type="text"
                                                value={newItem.title}
                                                onChange={(e) => setNewItem({...newItem, title: e.target.value})}
                                                className="border rounded px-3 py-2 w-full"
                                                placeholder="z.B. User Login implementieren"
                                            />
                                        </div>
                                        <div>
                                            <label className="block mb-2">Sprint:</label>
                                            <select 
                                                value={newItem.sprint}
                                                onChange={(e) => setNewItem({...newItem, sprint: e.target.value})}
                                                className="border rounded px-3 py-2 w-full"
                                            >
                                                <option value="">Sprint auswählen...</option>
                                                {SPRINTS.map(sprint => (
                                                    <option key={sprint.id} value={sprint.id}>
                                                        {sprint.name} (KW {sprint.startWeek}-{sprint.endWeek})
                                                    </option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block mb-2">Komplexität (Story Points):</label>
                                            <input 
                                                type="number"
                                                value={newItem.complexity}
                                                onChange={(e) => setNewItem({...newItem, complexity: parseInt(e.target.value)})}
                                                className="border rounded px-3 py-2 w-full"
                                                min="1"
                                            />
                                        </div>
                                        <div className="flex gap-2 justify-end">
                                            <button 
                                                onClick={() => setShowNewItemDialog(false)}
                                                className="px-4 py-2 border rounded hover:bg-gray-100"
                                            >
                                                Abbrechen
                                            </button>
                                            <button 
                                                onClick={addDevItem}
                                                className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                                            >
                                                Erstellen
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ResourcePlanner />, document.getElementById('root'));
    </script>
</body>
</html>
